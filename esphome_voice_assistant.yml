lvgl:
  displays: main_display
  buffer_size: 100%
  widgets:
    - label:
        id: test_label
        align: CENTER
        text: "Hello Frank!"
        text_font: montserrat_24
        y: -20

    - label:
        id: va_phase_label
        align: CENTER
        y: -160
        text: "Initializing..."
        text_font: montserrat_20

    # Request box (middle)
    - label:
        id: va_request_label
        align: CENTER
        y: -100
        text: ""
        text_font: montserrat_18
        styles: [box_style]

    # Response box (bottom)
    - label:
        id: va_response_label
        align: CENTER
        y: 140
        text: ""
        text_font: montserrat_18
        styles: [box_style]

    # Optional: a thin status line to show Wi‑Fi / HA status
    - label:
        id: va_status_label
        align: CENTER
        y: 190
        text: ""
        text_font: montserrat_16

##below are used to show home assistant value:
  style_definitions:
    # ── white box with black border (used for request / response) ──
    - id: box_style
      border_color: "000000"
      border_width: 2
      pad_all: 6
      radius: 4
      text_color: "000000"

    # a dimmed style for muted page ──
    - id: muted_bg_style
      bg_color: "444444"


# -----------------------------------------------------------------------------
# TEXT SENSORS → last request/response (easy to show on LVGL)
# -----------------------------------------------------------------------------
text_sensor:
  - platform: template
    id: text_request
    on_value:
      # truncate to ~32 chars like S3 Box 3 to fit compact UI          # [1](https://melbournecityit-my.sharepoint.com/personal/info_melbournecityit_com_au/Documents/Microsoft%20Copilot%20Chat%20Files/esp32-s3-box-3.yaml)
      - lambda: |-
          if (id(text_request).state.length() > 32) {
            std::string s = id(text_request).state.c_str();
            std::string t = esphome::str_truncate(s.c_str(), 31);
            id(text_request).state = (t + "...").c_str();
          }
  - platform: template
    id: text_response
    on_value:
      - lambda: |-
          if (id(text_response).state.length() > 32) {
            std::string s = id(text_response).state.c_str();
            std::string t = esphome::str_truncate(s.c_str(), 31);
            id(text_response).state = (t + "...").c_str();
          }

# -----------------------------------------------------------------------------
# GLOBALS → phase tracking + init flag + IDs for phases
# -----------------------------------------------------------------------------
globals:
  - id: init_in_progress
    type: bool
    restore_value: "false"
    initial_value: "true"


  # Phase IDs (matches S3 Box 3 semantics)
  - id: voice_assist_idle_phase_id
    type: int
    initial_value: "1"
  - id: voice_assist_listening_phase_id
    type: int
    initial_value: "2"
  - id: voice_assist_thinking_phase_id
    type: int
    initial_value: "3"
  - id: voice_assist_replying_phase_id
    type: int
    initial_value: "4"
  - id: voice_assist_not_ready_phase_id
    type: int
    initial_value: "10"
  - id: voice_assist_error_phase_id
    type: int
    initial_value: "11"
  - id: voice_assist_muted_phase_id
    type: int
    initial_value: "12"
  - id: voice_assist_timer_finished_phase_id
    type: int
    initial_value: "20"
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: "10"
