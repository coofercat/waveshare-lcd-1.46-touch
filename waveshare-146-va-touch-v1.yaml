        #    text_color: amber
        # Response box (bottom)
        - label:
            id: va_response_label
            align: CENTER
            text_align: CENTER
            y: 148
            text: "..."
            text_font: montserrat_22
            text_color: 0xffffff
            width: 255
            long_mode: SCROLL_CIRCULAR
            

        - label:
            id: timer_progress_text
            align: CENTER
            y: 170
            text: ""
            text_font: montserrat_44
            text_color: 0xffffff
            hidden: true

        # Circular Timer progress arc around the edge
        - arc:
            id: timer_progress_arc
            align: CENTER
            width: 412
            height: 412
            radius: 0            # LVGL computes radius from size; 0 keeps it centered
            bg_opa: transp
            bg_color: 0xFFFFFF   # white
            #start_angle: 0
            start_angle: 30
            #end_angle: 360
            end_angle: 330
            rotation: 90
            min_value: 0
            max_value: 100
            value: 0 
            indicator:
              width: 15        # ring thickness in pixels
              arc_color: green

                 

  style_definitions:
    # ── white box with black border (used for response)
    - id: box_style
      border_color: white
      border_width: 2
      pad_all: 6
      radius: 4
      text_color: white

    # a dimmed style for muted page
    - id: muted_bg_style
      bg_color: red

    # Base list item style (white text)
    - id: shopping_item_style
      bg_opa: transp
      bg_color: 0xFFFFFF
      border_width: 2
      border_color: 0x000000
      radius: 10
      pad_left: 14
      pad_right: 14
      pad_top: 8
      pad_bottom: 8
      text_color: 0x000000

    - id: date_style
      text_color: 0x000000       # black text
      text_font: montserrat_28
      bg_opa: TRANSP             # transparent background
      border_opa: TRANSP
      pad_all: 4
      align: CENTER 

# TEXT SENSORS → last response
# -----------------------------------------------------------------------------
text_sensor:
  - platform: template
    id: text_response

sensor:
  - platform: homeassistant
    id: ha_power_w
    entity_id: ${left_sensor}
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: power_value_lbl
            text:
              format: "%d W"
              # IMPORTANT: this is a plain expression string, not !lambda
              args: [ "(int) roundf(id(ha_power_w).state)" ]
   # Reports the WiFi signal strength/RSSI in dB

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
    


  - platform: copy # WiFi signal in %
    source_id: wifi_signal_db
    id: wifi_signal_pct
    name: "WiFi Signal Percent"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"
    device_class: ""
  
    on_value:
      then:
        - lvgl.label.update:
            id: wifi_db_label
            text:
              format: "%.0f"
              args: [ 'x' ]

  - platform: debug
    
    free:
      name: "Heap Free"
      unit_of_measurement: kB
      accuracy_decimals: 1
      filters:
        - lambda: |-
            // bytes -> kB (SI)
            return x / 1000.0;

    loop_time:
      name: "Loop Time"
    
    block:
      name: "Heap Max Block"
      unit_of_measurement: kB
      accuracy_decimals: 1
      filters:
        - lambda: |-
            return x / 1000.0;

binary_sensor:
  - platform: homeassistant
    id: ha_nightlight_state
    entity_id: ${right_switch}
    publish_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: esp_tvlight_switch
            state:
              checked: !lambda 'return x;'

# GLOBALS → phase tracking + init flag + IDs for phases
# -----------------------------------------------------
globals:
  - id: init_in_progress
    type: bool
    restore_value: "false"
    initial_value: "true"

  # True only during listening
  - id: va_listening_glow
    type: bool
    restore_value: no
    initial_value: 'false'

  # Direction for ping‑pong (1 forward, -1 backward)
  - id: va_color_dir
    type: int
    restore_value: no
    initial_value: '1'

  # The current color to apply (0xRRGGBB)
  - id: va_color_hex
    type: int
    restore_value: no
    initial_value: '0xFF0000'  # start at red

  - id: timer_progress_text_str
    type: std::string
    restore_value: no
    initial_value: ""


  # voice assistant Phase IDs
  - id: voice_assist_idle_phase_id
    type: int
    initial_value: "1"
  - id: voice_assist_listening_phase_id
    type: int
    initial_value: "2"
  - id: voice_assist_thinking_phase_id
    type: int
    initial_value: "3"
  - id: voice_assist_replying_phase_id
    type: int
    initial_value: "4"
  - id: voice_assist_not_ready_phase_id
    type: int
    initial_value: "10"
  - id: voice_assist_error_phase_id
    type: int
    initial_value: "11"
  - id: voice_assist_muted_phase_id
    type: int
    initial_value: "12"
  - id: voice_assist_timer_finished_phase_id
    type: int
    initial_value: "20"
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: "10"

  - id: last_tts_ms
    type: int
    restore_value: false
    initial_value: "0"

  - id: timer_progress_percent
    type: int
    restore_value: yes
    initial_value: "0"

  - id: timer_progress_has_timer
    type: bool
    #set to restore timer on reboot
    restore_value: yes
    initial_value: "false"

  - id: timer_progress_seconds_left
    type: int
    restore_value: yes
    initial_value: "0"

  # Listening, phase text blinking
  - id: va_blinking
    type: bool
    initial_value: "false"

  - id: va_blink_on
    type: bool
    initial_value: "false"



# ESPHome text entity to hold the Shopping List string
text:
  - platform: template
    id: shopping_text
    name: "Shopping list"
    mode: text
    restore_value: false
    optimistic: true
    # Whenever HA sets a new value, update the LVGL label
    on_value:
