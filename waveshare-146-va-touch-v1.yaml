  gradients:
    - id: listen_rog
      direction: hor
      dither: none
      stops:
        - color: 0xFF0000  # Red
          position: 0%
        - color: 0xFFA500  # Orange
          position: 50%    # midpoint
        - color: 0x00FF00  # Green
          position: 100%

  pages:
    - id: main_page
      bg_image_src: round_bg
      bg_image_opa: COVER
      bg_opa: transp
      widgets:
        # Status line to show Wi‑Fi / HA status
        - label:
            id: va_status_label
            align: CENTER
            x: -20
            y: -190
            text: ""
            text_font: montserrat_16

        - label:
            id: wifi_db_label
            align: CENTER
            x: 37
            y: -190
            text: "--%"
            text_color: 0xffffff
            text_font: montserrat_20

        - label:
            id: va_phase_label
            align: CENTER
            y: -160
            text: "Initializing..."
            text_font: montserrat_20
            text_color: 0xffffff

        # Blue power icon
        - label:
            id: power_icon_lbl
            align: CENTER
            y: -19
            x: -172
            text: "\U000F0241"
            text_font: roboto_icons_40
            text_color: 0x2196F3  # blue (Material Blue 500)

