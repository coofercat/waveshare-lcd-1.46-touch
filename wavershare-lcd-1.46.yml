lvgl:
  displays: main_display
  disp_bg_image: round_bg
  disp_bg_opa: COVER
  buffer_size: 100%
  widgets:
    # Status line to show Wi‑Fi / HA status
    - label:
        id: va_status_label
        align: CENTER
        y: -190
        text: ""
        text_font: montserrat_16

    - label:
        id: va_phase_label
        align: CENTER
        y: -160
        text: "Initializing..."
        text_font: montserrat_20

    # Orange divider line under the label
    - obj:
        id: va_status_divider
        align: CENTER
        y: -137
        width: 70%
        height: 2        # line thickness
        radius: 0
        bg_color: 0xFFA500   # orange
        bg_opa: 100%


    - label:
        id: shoppingcart_label
        align: CENTER
        text_font: roboto_icons_40
        text: "\U000F0110"
        text_color: blue
        y: -105
    
    - label:
        id: shopping_label
        align: CENTER
        y: -35
        text: ""                # will be updated from HA
        text_font: montserrat_26
    # Response box (bottom)
    - label:
        id: va_response_label
        align: CENTER
        y: 120
        text: "..."
        text_font: montserrat_18
    - label:
        id: timer_progress_text
        align: CENTER
        y: 130
        text: ""
        text_font: montserrat_44
        text_color: 0x111111
        hidden: true
    # temperature label at bottom
    - label:
        id: temp_value_label
        align: CENTER
        y: 185
        x: 10
        text: "--.-°C"
        text_font: montserrat_24

    # Circular Timer progress arc around the edge
    - arc:
        id: timer_progress_arc
        align: CENTER
        width: 396
        height: 396
        radius: 0            # LVGL computes radius from size; 0 keeps it centered
        bg_opa: transp
        bg_color: 0xE0E0E0   # light grey
        start_angle: 0
        end_angle: 360
        rotation: 0
        min_value: 0
        max_value: 100
        value: 0 
        indicator:
          bg_color: 0x26ED3A # green progress (change to taste)
          width: 10          # ring thickness in pixels
  
  style_definitions:
    # ── white box with black border (used for response)
    - id: box_style
      border_color: "000000"
      border_width: 2
      pad_all: 6
      radius: 4
      text_color: "000000"

    # a dimmed style for muted page
    - id: muted_bg_style
      bg_color: 0x444444

    # Base list item style (white card, black text, rounded corners)
    
    - id: shopping_item_style
      bg_opa: transp
      bg_color: 0xFFFFFF
      border_width: 2
      border_color: 0x000000
      radius: 10
      pad_left: 14
      pad_right: 14
      pad_top: 8
      pad_bottom: 8
      text_color: 0x000000

    # Active/selected item (e.g., currently focused)
    - id: shopping_item_active_style
      bg_color: 0xE6F4EA       # light green
      border_color: 0x26ED3A    # green
      text_color: 0x000000



# -----------------------------------------------------------------------------
# TEXT SENSORS → last request/response (easy to show on LVGL)
# -----------------------------------------------------------------------------
text_sensor:

  - platform: template
    id: text_response
    on_value:
      - lambda: |-
          if (id(text_response).state.length() > 32) {
            std::string s = id(text_response).state.c_str();
            std::string t = esphome::str_truncate(s.c_str(), 31);
            id(text_response).state = (t + "...").c_str();
          }


sensor:
  - platform: homeassistant
    id: ha_living_temp
    entity_id: sensor.broadlink_livingroom_temperature
    on_value:
      # Optional: update a label showing the numeric value as text
      - lvgl.label.update:
          id: temp_value_label
          text:
            format: "%.1f°C"
            args: [ 'x' ]
      
      - logger.log:
          format: "LivingRoomTemp raw=%.2f"
          args: [ 'x' ]

# GLOBALS → phase tracking + init flag + IDs for phases
# -----------------------------------------------------------------------------
globals:
  - id: init_in_progress
    type: bool
    restore_value: "false"
    initial_value: "true"


  # Phase IDs
  - id: voice_assist_idle_phase_id
    type: int
    initial_value: "1"
  - id: voice_assist_listening_phase_id
    type: int
    initial_value: "2"
  - id: voice_assist_thinking_phase_id
    type: int
    initial_value: "3"
  - id: voice_assist_replying_phase_id
    type: int
    initial_value: "4"
  - id: voice_assist_not_ready_phase_id
    type: int
    initial_value: "10"
  - id: voice_assist_error_phase_id
    type: int
    initial_value: "11"
  - id: voice_assist_muted_phase_id
    type: int
    initial_value: "12"
  - id: voice_assist_timer_finished_phase_id
    type: int
    initial_value: "20"
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: "10"

  - id: last_tts_ms
    type: int
    restore_value: false
    initial_value: "0"

  - id: timer_progress_percent
    type: int
    restore_value: false
    initial_value: "0"

  - id: timer_progress_has_timer
    type: bool
    restore_value: false
    initial_value: "false"
  # phase text blinking

  - id: va_blinking
    type: bool
    initial_value: "false"

  - id: va_blink_on
    type: bool
    initial_value: "false"

  - id: timer_progress_seconds_left
    type: int
    initial_value: "0"

# ESPHome text entity to hold the Shopping List string
text:
  - platform: template
    id: shopping_text
    name: "Shopping list"
    mode: text
    restore_value: true
    optimistic: true
    # Whenever HA sets a new value, update the LVGL label
    on_value:
      then:
        - lvgl.label.update:
            id: shopping_label
            text: !lambda |-
              return id(shopping_text).state.c_str();
        - lvgl.widget.redraw: shopping_label

