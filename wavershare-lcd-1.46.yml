# v1.1 Removing request text
# fixed dim issue while timer is active. added icon
---
substitutions:
  bg_img: /config/esphome/images/default/waveshare_bg_tp_420.png

esphome:
  name: waveshare-146-va
  friendly_name: waveshare 146 va 1.1
  on_boot:
    priority: 600
    then:
      - script.execute: draw_display
      - delay: 5s
      - lvgl.widget.update:
          id: timer_progress_arc
          hidden: true
      - lvgl.update:
          disp_bg_image: round_bg
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"  # TLS1.3 support isn't enabled by default in IDF 5.1.5

logger:
  level: DEBUG
# Enable Home Assistant API
api:
  encryption:
    key: "/NRi8kWEuodQFhY40a8yvujDUELH0yhZIOTECv81wU0="

ota:
  - platform: esphome
    password: "1554a3a8fd1fa8d97307d74f21aa9fde"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Waveshare-146-Va"
    password: "wifi12345"

captive_portal:
time:
  - platform: homeassistant
    on_time:
      - hours: 1,2,3,4,5,6,7
        minutes: 5
        seconds: 0
        then:
          - switch.turn_on: switch_antiburn
      - hours: 1,2,3,4,5,6,7
        minutes: 50
        seconds: 0
        then:
          - switch.turn_off: switch_antiburn


interval:
  - interval: 5s
    then:
      - if:
          condition:
            and:
              # 1) VA pipeline not running (no current conversation)
              - not:
                  voice_assistant.is_running:

              # 2) At least 2min since the last TTS playback
              - lambda: |-
                  return (millis() - id(last_tts_ms)) > 120000;

              # 3) NEW: No active ticking timers
              #    We iterate voice assistant timers and ensure none is active.
              - lambda: |-
                  const auto timers = id(va).get_timers();
                  for (auto &kv : timers) {
                    const auto &t = kv.second;
                    if (t.is_active && t.seconds_left > 0) {
                      return false; 
                    }
                  }
                  return true;         // no active timers => OK to dim
          then:
              # Dim off screen (only when all three conditions are true)
            - light.turn_on:
                id: screen_backlight
                brightness: 25%



  - interval: 500ms
    then:
      - if:
          condition:
            lambda: 'return id(va_blinking);'
          then:
            - lambda: |-
                id(va_blink_on) = !id(va_blink_on);
            # Use two explicit branches so we can pass literal percent values
            - if:
                condition:
                  lambda: 'return id(va_blink_on);'
                then:
                  - lvgl.label.update:
                      id: va_phase_label
                      text_opa: 100%
                else:
                  - lvgl.label.update:
                      id: va_phase_label
                      text_opa: 0%

  - interval: 1s
    then:
      - script.execute: update_timer_progress_arc


psram:
  mode: octal
  speed: 80MHz

i2s_audio:
  - id: i2s_output
    # i2s_output data pin is gpio10
    i2s_lrclk_pin:
      number: GPIO38
    i2s_bclk_pin:
      number: GPIO48

  - id: i2s_input
    # data line is GPIO15
    i2s_lrclk_pin:
      number: GPIO2
    i2s_bclk_pin:
      number: GPIO15

microphone:
  - platform: i2s_audio
    id: i2s_microphone
    i2s_audio_id: i2s_input
    i2s_din_pin: GPIO39
    adc_type: external
    pdm: false
    channel: right
    sample_rate: 16000
    bits_per_sample: 16bit

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    i2s_audio_id: i2s_output
    i2s_dout_pin: GPIO47
    dac_type: external
    channel: stereo
    
i2c:
  sda: GPIO11
  scl: GPIO10
  scan: true
  #frequency: 50kHz
  #timeout: 1000ms


# -----------------------------------------------------------------------------
# MEDIA PLAYER → binds VA audio output to your existing i2s speaker
media_player:
  - platform: speaker
    id: speaker_media_player
    name: None
    volume_min: 0.5
    volume_max: 1
    announcement_pipeline:
      speaker: i2s_audio_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 2
    files:
      - id: timer_finished_sound
        file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
  
    # Pause wake word during announcements, then redraw
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
      # Show muted phase when media plays and VA isn't running
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - lambda: id(voice_assistant_phase) = id(voice_assist_muted_phase_id);
            - script.execute: draw_display

    on_idle:
      # Restart wake word after announcement finishes
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase
            - script.execute: draw_display

# -----------------------------------------------------------------------------
# ON-DEVICE MICRO WAKE WORD → same models as S3 Box 3
# -----------------------------------------------------------------------------
micro_wake_word:
  id: mww
  models:
    - okay_nabu
    - hey_mycroft
    - hey_jarvis
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

# -----------------------------------------------------------------------------
# VOICE ASSISTANT CORE
# -----------------------------------------------------------------------------
voice_assistant:
  id: va
  microphone: i2s_microphone         # <-- your mic id
  media_player: speaker_media_player  # <-- the media_player above
  micro_wake_word: mww

  # Audio tuning (same as S3 Box 3 baseline)  
  noise_suppression_level: 3
  auto_gain: 31dBFS
  volume_multiplier: 3.0

  # UI hooks (update request/response + phases)
  on_listening:
    - lambda: id(voice_assistant_phase) = id(voice_assist_listening_phase_id);

    - text_sensor.template.publish:
        id: text_response
        state: "..."
    - script.execute: draw_display
      
    - lvgl.widget.update:
        id: timer_progress_arc
        hidden: true
      
    - light.turn_on:
        id: screen_backlight
        brightness: 80%
    #listening effect for listening status.
    - lambda: |-
        id(va_blinking) = true;
    - lvgl.widget.update:
        id: va_phase_label
        text_opa: 100%

  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = id(voice_assist_thinking_phase_id);
    - script.execute: draw_display


  on_tts_start:
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - lambda: id(voice_assistant_phase) = id(voice_assist_replying_phase_id);
    - script.execute: draw_display
    - lambda: 'id(last_tts_ms) = millis();'

  on_end:
    - wait_until:
        condition:
          media_player.is_announcing:
        timeout: 0.5s
    
    - lambda: 'id(last_tts_ms) = millis();'
    # keep your existing on_end actions (wait_until, set_idle_or_mute_phase, draw_display, etc.)
    
    # wait for I2S bus to be free (no announcement and speaker not playing)
    - wait_until:
        condition:
          and:
            - not:
                media_player.is_announcing:
            - not:
                speaker.is_playing:

    # restart on-device wake word only if "On device"
    - if:
        condition:
          lambda: return id(wake_word_engine_location).state == "On device";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:

    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display

    # clear text sensors
    - text_sensor.template.publish: { id: text_response, state: "" }
    
    #restore the phase text style
    - lambda: |-
        id(va_blinking) = false;
    # Restore to a steady state (100% opacity and a status you prefer)
    - lvgl.label.update:
        id: va_phase_label
        text: "Idle"
        text_opa: 100%



  on_error:
    - lambda: id(voice_assistant_phase) = id(voice_assist_error_phase_id);
    - script.execute: draw_display
    - delay: 1s
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display

  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display

  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = id(voice_assist_not_ready_phase_id);
    - script.execute: draw_display

  # Optional: timer hooks (if you plan to surface timers on LVGL)
  on_timer_started:
    - script.execute: update_timer_progress_arc
    - script.execute: draw_display
    - light.turn_on:
        id: screen_backlight
        brightness: 80%
  on_timer_cancelled:
    - script.execute: update_timer_progress_arc
    - script.execute: draw_display
    - lvgl.widget.update:
        id: timer_progress_arc
        hidden: true
  on_timer_updated:
    - script.execute: update_timer_progress_arc
    - script.execute: draw_display
  on_timer_tick:
    - script.execute: update_timer_progress_arc
    - script.execute: draw_display
  on_timer_finished:
    - script.execute: update_timer_progress_arc
    - script.execute: ring_timer_10x
    - lambda: id(voice_assistant_phase) = id(voice_assist_timer_finished_phase_id);
    - script.execute: draw_display
    - lvgl.widget.update:
        id: timer_progress_arc
        hidden: true
    - light.turn_on:
        id: screen_backlight
        brightness: 80%

# -----------------------------------------------------------------------------
# MUTE SWITCH (software mute) + optional speaker enable
# -----------------------------------------------------------------------------
switch:
  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - script.execute: set_idle_or_mute_phase
      - script.execute: draw_display
    on_turn_on:
      - microphone.mute:
      - script.execute: set_idle_or_mute_phase
      - script.execute: draw_display

  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
# -----------------------------------------------------------------------------
# SELECT → choose wake word engine location (device vs HA streaming)
# -----------------------------------------------------------------------------
select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device

    on_value:
      # Wait until VA is either Muted or Idle before switching engines
      - wait_until:
          condition:
            lambda: return id(voice_assistant_phase) == id(voice_assist_muted_phase_id) ||
                            id(voice_assistant_phase) == id(voice_assist_idle_phase_id);

      # Switch to HA streaming wake word
      - if:
          condition:
            lambda: return x == "In Home Assistant";
          then:
            - micro_wake_word.stop
            - delay: 500ms
            - if:
                condition:
                  switch.is_off: mute
                then:
                  - lambda: id(va).set_use_wake_word(true);
                  - voice_assistant.start_continuous:

      # Switch to on-device micro wake word
      - if:
          condition:
            lambda: return x == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop
            - delay: 500ms
            - if:
                condition:
                  switch.is_off: mute
                then:
                  - micro_wake_word.start


# -----------------------------------------------------------------------------
# SCRIPTS → start/stop wake word + phase helper
# -----------------------------------------------------------------------------

script:
  - id: start_wake_word
    then:
      # Start on-device micro wake word when VA isn't already running
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:

      # Start HA streaming wake word when VA isn't already running
      - if:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:


  # Stops either micro wake word or streaming wake word
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).state == "On device";
          then:
            - micro_wake_word.stop:

  # Set phase to idle/muted depending on software mute
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = id(voice_assist_idle_phase_id);
          else:
            - lambda: id(voice_assistant_phase) = id(voice_assist_muted_phase_id);

  - id: draw_display
    then:
      # If still initializing, just show that
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lvgl.label.update:
                id: va_phase_label
                text: "Initializing..."
            - lvgl.label.update:
                id: va_status_label
                text: ""
            - lvgl.label.update:
                id: va_response_label
                text: ""
            - script.execute: lvgl_apply_mute_style_if_needed
            - lvgl.widget.redraw: va_phase_label
            - lvgl.widget.redraw: va_status_label
            - lvgl.widget.redraw: va_response_label

      # Not initializing: check connectivity and update accordingly
      - if:
          condition:
            wifi.connected:
          then:
            - if:
                condition:
                  api.connected:
                then:
                  # Connected to HA: show phase + last request/response
                  - lvgl.label.update:
                      id: va_phase_label
                      text: !lambda |-
                        switch (id(voice_assistant_phase)) {
                          case 1:  return "Idle";
                          case 2:  return "Listening...";
                          case 3:  return "Thinking...";
                          case 4:  return "Replying...";
                          case 10: return "Not ready";
                          case 11: return "Error";
                          case 12: return "Muted";
                          case 20: return "Timer finished";
                          default: return "Idle";
                        }

                  - lvgl.label.update:
                      id: va_response_label
                      text: !lambda return id(text_response).state.c_str();
                  - lvgl.label.update:
                      id: va_status_label
                      # Wifi Good, HA good
                      text: "\U000F16BD  •  \U000F07D1"
                      text_font: roboto_icons_25
                      text_color: green
                  - script.execute: lvgl_apply_mute_style_if_needed
                  - lvgl.widget.redraw: va_phase_label
                  - lvgl.widget.redraw: va_response_label
                  - lvgl.widget.redraw: va_status_label
                else:
                  # No HA: show status; clear response
                  - lvgl.label.update:
                      id: va_phase_label
                      text: "No HA"
                  - lvgl.label.update: { id: va_response_label, text: "" }
                  - lvgl.label.update:
                      id: va_status_label
                      # Wifi Good, No HA
                      text: "\U000F16BD •  \U000F1A35"
                      text_font: roboto_icons_25
                      text_color: red
                  - script.execute: lvgl_apply_mute_style_if_needed
                  - lvgl.widget.redraw: va_phase_label
                  - lvgl.widget.redraw: va_response_label
                  - lvgl.widget.redraw: va_status_label
          else:
            # No Wi‑Fi: show status; clear response
            - lvgl.label.update:
                id: va_phase_label
                text: "\U000F16BC"
                text_font: roboto_icons_25
            - lvgl.label.update: { id: va_response_label, text: "" }
            - script.execute: lvgl_apply_mute_style_if_needed
            - lvgl.widget.redraw: va_phase_label
            - lvgl.widget.redraw: va_response_label
            - lvgl.widget.redraw: va_status_label

  # Helper: apply muted style dimming when the Mute switch is ON

  - id: lvgl_apply_mute_style_if_needed
    then:
      - if:
          condition:
            switch.is_on: mute
          then:
            # Apply a dimmed look when muted
            - lvgl.widget.update:
                id: va_phase_label
                bg_color: 0x444444     # dark gray background
                text_color: 0x381e7a   # dark blue

            - lvgl.widget.update:
                id: va_response_label
                bg_color: 0x444444
                text_color: 0x000000

          else:
            # Restore normal look when unmuted (adjust to your theme)
            - lvgl.widget.update:
                id: va_phase_label
                bg_color: 0xFFFFFF
                text_color: 0x381e7a

            - lvgl.widget.update:
                id: va_response_label
                bg_color: 0xFFFFFF
                text_color: 0x000000


  - id: ring_timer_10x
    mode: queued
    then:
      - repeat:
          count: 10
          then:
            - media_player.speaker.play_on_device_media_file:
                media_file: timer_finished_sound
                announcement: true

            - wait_until:
                condition:
                  media_player.is_announcing:
                timeout: 2s

            # Wait until the announcement finishes before next loop
            - wait_until:
                condition:
                  - not:
                      media_player.is_announcing:
                timeout: 10s

            # Small gap between repeats
            - delay: 300ms

  - id: update_timer_progress_arc
    then:
      - lambda: |-
          // Get all timers
          const auto timers = id(va).get_timers();
          bool has_any = timers.size() > 0;

          // Choose the soonest ACTIVE timer; else the soonest overall
          bool has_active = false;
          voice_assistant::Timer chosen = has_any ? timers.begin()->second : voice_assistant::Timer{};
          if (has_any) {
            for (auto &kv : timers) {
              const auto &t = kv.second;
              if (t.is_active) {
                if (!has_active || t.seconds_left <= chosen.seconds_left) {
                  chosen = t;
                }
                has_active = true;
              }
            }
            if (!has_active) {
              for (auto &kv : timers) {
                const auto &t = kv.second;
                if (t.seconds_left <= chosen.seconds_left) {
                  chosen = t;
                }
              }
            }
          }

          // Compute percentage remaining (0..100), clamp
          int pct = 0;
          if (has_any) {
            const uint32_t total = chosen.total_seconds > 0 ? chosen.total_seconds : 1;
            pct = (int) roundf(100.0f * (float) chosen.seconds_left / (float) total);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
          }

          // Store results for later updates
          id(timer_progress_percent) = pct;
          id(timer_progress_has_timer) = has_any;
          id(timer_progress_seconds_left) = has_any ? (int) chosen.seconds_left : 0;

      # Show & update arc + text when a timer is present
      - if:
          condition:
            lambda: 'return id(timer_progress_has_timer);'
          then:
            - lvgl.widget.update:
                id: timer_progress_arc
                hidden: false
            - lvgl.arc.update:
                id: timer_progress_arc
                value: !lambda 'return id(timer_progress_percent);'

            # Update the center label text: HH:MM:SS if >=1h, else MM:SS
            - lvgl.label.update:
                id: timer_progress_text
                text: !lambda |-
                  int sec = id(timer_progress_seconds_left);
                  char buf[16];
                  if (sec >= 3600) {
                    int h = sec / 3600;
                    int m = (sec % 3600) / 60;
                    int s = sec % 60;
                    snprintf(buf, sizeof(buf), "%d:%02d:%02d", h, m, s);
                  } else {
                    int m = sec / 60;
                    int s = sec % 60;
                    snprintf(buf, sizeof(buf), "%02d:%02d", m, s);
                  }
                  return std::string(buf);
            - lvgl.widget.update:
                id: timer_progress_text
                hidden: false

          else:
            - lvgl.widget.update:
                id: timer_progress_arc
                hidden: true
            - lvgl.widget.update:
                id: timer_progress_text
                hidden: true



pca9554:
  - id: 'pca9554a_device'
    address: 0x20

output:
  - platform: ledc
    pin: GPIO5
    id: backlight

light:
  - platform: monochromatic
    id: screen_backlight
    output: backlight
    name: "backlight Light" 
    restore_mode: ALWAYS_ON

spi:
  id: display_qspi
  type: quad
  clk_pin: GPIO40
  interface: spi2
  data_pins: [GPIO46, GPIO45, GPIO42, GPIO41]

display:
  - platform: qspi_dbi
    model: CUSTOM
    rotation: 180
    data_rate: 10MHz
    id: main_display
    spi_id: display_qspi
    color_order: rgb
    dimensions:
      height: 412
      width: 412     
    cs_pin: GPIO21
    reset_pin: 
      pca9554: pca9554a_device
      number: 1     
    auto_clear_enabled: false 
    spi_mode: 0       
    draw_rounding: 4  
    init_sequence:
      - [ 0xFF, 0x20, 0x10, 0x00]
      - [ 0x36, 0x00]
      - [ 0x3A, 0x55]
      - [ 0xFF, 0x20, 0x10, 0x10]
      - [ 0x0C, 0x11]
      - [ 0x10, 0x02]
      - [ 0x11, 0x11]
      - [ 0x15, 0x42]
      - [ 0x16, 0x11]
      - [ 0x1A, 0x02]
      - [ 0x1B, 0x11]
      - [ 0x61, 0x80]
      - [ 0x62, 0x80]
      - [ 0x54, 0x44]
      - [ 0x58, 0x88]
      - [ 0x5C, 0xcc]
      - [ 0xFF, 0x20, 0x10, 0x10]
      - [ 0x20, 0x80]
      - [ 0x21, 0x81]
      - [ 0x22, 0x31]
      - [ 0x23, 0x20]
      - [ 0x24, 0x11]
      - [ 0x25, 0x11]
      - [ 0x26, 0x12]
